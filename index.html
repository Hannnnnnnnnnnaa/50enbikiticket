<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>なかやのアップルパイ クーポン</title>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #fff5f5;
      background-image: radial-gradient(circle, #ffcdd2 1px, transparent 1px);
      background-size: 20px 20px;
      display: flex; justify-content: center; align-items: center; padding: 20px;
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
    }
    .coupon {
      width: 100%; max-width: 360px;
      background: #fff;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 8px 0 #e74c3c, 0 12px 30px rgba(231,76,60,0.2);
      border: 3px solid #e74c3c;
    }
    .header {
      background: #e74c3c;
      padding: 20px 15px 15px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '';
      position: absolute; inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.15) 8px, transparent 8px);
      background-size: 30px 30px;
    }
    .store-name {
      font-size: 12px;
      color: rgba(255,255,255,0.85);
      letter-spacing: 2px;
      margin-bottom: 4px;
      position: relative;
    }
    .coupon-title {
      font-size: 20px;
      font-weight: 900;
      color: #fff;
      position: relative;
      text-shadow: 2px 2px 0 rgba(0,0,0,0.15);
    }
    .apple-area {
      background: linear-gradient(180deg, #e74c3c 0%, #fff 40%);
      text-align: center;
      padding: 10px 0 0;
      font-size: 64px;
      line-height: 1;
    }
    .main {
      padding: 10px 20px 20px;
      text-align: center;
    }
    .item-tag {
      display: inline-block;
      background: #fff5f5;
      border: 2px solid #e74c3c;
      color: #e74c3c;
      font-size: 13px;
      font-weight: bold;
      padding: 4px 16px;
      border-radius: 50px;
      margin-bottom: 12px;
    }
    .discount-wrap {
      background: linear-gradient(135deg, #e74c3c, #c0392b);
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 14px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 0 #922b21;
    }
    .discount-wrap::before {
      content: '🍎🍎🍎🍎🍎🍎';
      position: absolute;
      top: -5px; left: 0; right: 0;
      font-size: 20px;
      opacity: 0.15;
      letter-spacing: 5px;
    }
    .discount-num {
      font-size: 68px;
      font-weight: 900;
      color: #fff;
      line-height: 1;
      text-shadow: 3px 3px 0 rgba(0,0,0,0.2);
      position: relative;
    }
    .discount-yen {
      font-size: 26px;
      font-weight: 900;
      color: #ffcdd2;
      position: relative;
    }
    .discount-off {
      font-size: 20px;
      font-weight: 900;
      color: #fff;
      letter-spacing: 2px;
      position: relative;
    }
    .expiry-box {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #fff5f5;
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 10px;
      border: 2px dashed #f1948a;
    }
    .expiry-box .label { font-size: 11px; color: #e74c3c; font-weight: bold; }
    .expiry-box .date { font-size: 15px; font-weight: 900; color: #c0392b; }

    /* 個人ID表示エリア */
    .id-box {
      background: #1a1a2e;
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .id-label {
      font-size: 10px;
      color: #aaa;
      letter-spacing: 1px;
      white-space: nowrap;
    }
    .id-value {
      font-size: 13px;
      font-weight: 900;
      color: #f39c12;
      letter-spacing: 2px;
      font-family: 'Courier New', monospace;
      word-break: break-all;
      text-align: right;
    }

    .use-btn {
      width: 100%;
      background: linear-gradient(135deg, #f39c12, #e67e22);
      color: #fff;
      border: none;
      padding: 16px;
      font-size: 16px;
      font-weight: 900;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 4px 0 #d68910;
      transition: all 0.15s;
      letter-spacing: 1px;
    }
    .use-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #d68910; }

    /* 使用済み */
    .used-view {
      display: none;
      padding: 30px 20px;
      text-align: center;
    }
    .used-emoji { font-size: 60px; margin-bottom: 12px; }
    .used-title { font-size: 20px; font-weight: 900; color: #e74c3c; margin-bottom: 6px; }
    .used-sub { font-size: 13px; color: #e67e22; font-weight: bold; }
    .used-time { font-size: 11px; color: #f1948a; margin-top: 6px; }
    .used-id {
      margin-top: 12px;
      background: #1a1a2e;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 11px;
      color: #f39c12;
      font-family: 'Courier New', monospace;
      letter-spacing: 1px;
    }

    /* 期限切れ */
    .expired-view {
      display: none;
      padding: 30px 20px;
      text-align: center;
    }
    .expired-emoji { font-size: 60px; margin-bottom: 12px; }
    .expired-title { font-size: 20px; font-weight: 900; color: #95a5a6; margin-bottom: 6px; }
    .expired-sub { font-size: 13px; color: #bdc3c7; }

    .footer {
      background: #fff5f5;
      border-top: 2px dashed #f1948a;
      padding: 12px 16px;
      font-size: 10px;
      color: #e74c3c;
      line-height: 1.7;
    }
    .footer ul { margin-left: 14px; }

    /* モーダル */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); z-index: 100;
      justify-content: center; align-items: center; padding: 20px;
    }
    .modal {
      background: #fff; border-radius: 20px; border: 3px solid #e74c3c;
      padding: 25px 20px; width: 100%; max-width: 300px; text-align: center;
      box-shadow: 0 6px 0 #e74c3c;
      animation: popIn 0.3s cubic-bezier(0.175,0.885,0.32,1.275);
    }
    @keyframes popIn { from{transform:scale(0.8);opacity:0} to{transform:scale(1);opacity:1} }
    .modal-icon { font-size: 40px; margin-bottom: 10px; }
    .modal h3 { font-size: 17px; font-weight: 900; color: #c0392b; margin-bottom: 8px; }
    .modal p { font-size: 13px; color: #7f8c8d; margin-bottom: 20px; line-height: 1.6; }
    .modal-id { font-size: 12px; color: #f39c12; font-family: 'Courier New', monospace; background: #1a1a2e; padding: 6px 10px; border-radius: 6px; margin-bottom: 16px; word-break: break-all; }
    .modal-btns { display: flex; gap: 10px; }
    .mbtn { flex:1; padding: 13px; border: none; border-radius: 50px; font-size: 14px; font-weight: 900; cursor: pointer; }
    .mbtn-cancel { background: #f0f0f0; color: #7f8c8d; }
    .mbtn-ok { background: #e74c3c; color: #fff; box-shadow: 0 3px 0 #c0392b; }
  </style>
</head>
<body>
  <div class="coupon">
    <div class="header">
      <div class="store-name">手作りパイの店　なかや</div>
      <div class="coupon-title">🎉 お得なクーポン 🎉</div>
    </div>
    <div class="apple-area">🍎</div>

    <!-- 有効クーポン表示 -->
    <div class="main" id="active-view">
      <div class="item-tag">アップルパイ専用</div>
      <div class="discount-wrap">
        <div class="discount-num">50<span class="discount-yen">円</span></div>
        <div class="discount-off">O F F !</div>
      </div>
      <div class="expiry-box">
        <span class="label">📅 有効期限</span>
        <span class="date">2026年7月11日（土）まで</span>
      </div>
      <div class="id-box">
        <span class="id-label">🔐 クーポンID</span>
        <span class="id-value" id="coupon-id">---</span>
      </div>
      <button class="use-btn" onclick="openModal()">✋ スタッフに見せて使う！</button>
    </div>

    <!-- 使用済み表示 -->
    <div class="used-view" id="used-view">
      <div class="used-emoji">🎊</div>
      <div class="used-title">使用済み！</div>
      <div class="used-sub">またのご来店をお待ちしています♪</div>
      <div class="used-time" id="used-time"></div>
      <div class="used-id" id="used-id-display"></div>
    </div>

    <!-- 期限切れ表示 -->
    <div class="expired-view" id="expired-view">
      <div class="expired-emoji">😢</div>
      <div class="expired-title">有効期限切れ</div>
      <div class="expired-sub">このクーポンはご利用いただけません</div>
    </div>

    <div class="footer">
      <ul>
        <li>アップルパイ1点のご購入につき1枚限り有効</li>
        <li>本クーポンは端末ごとに1回のみ使用可能です</li>
        <li>他割引・クーポンとの併用不可</li>
        <li>現金への引き換え不可</li>
      </ul>
    </div>
  </div>

  <!-- 確認モーダル -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-icon">🍎</div>
      <h3>スタッフ確認用</h3>
      <p>このクーポンを使用済みにしますか？<br><span style="color:#e74c3c;font-size:12px;font-weight:bold">※一度使用すると再利用できません</span></p>
      <div class="modal-id" id="modal-id-display"></div>
      <div class="modal-btns">
        <button class="mbtn mbtn-cancel" onclick="closeModal()">戻る</button>
        <button class="mbtn mbtn-ok" onclick="useCoupon()">使用する！</button>
      </div>
    </div>
  </div>

  <script>
    const EXPIRY = new Date('2026-07-11T23:59:59');
    const STORAGE_KEY = 'nakaya_coupon_v1';

    // ランダムIDを生成（端末ごとに固定）
    function generateId() {
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      let id = 'NK-';
      for (let i = 0; i < 4; i++) id += chars[Math.floor(Math.random() * chars.length)];
      id += '-';
      for (let i = 0; i < 4; i++) id += chars[Math.floor(Math.random() * chars.length)];
      return id;
    }

    // localStorageからクーポン状態を取得 or 初期化
    function getState() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        try { return JSON.parse(raw); } catch(e) {}
      }
      const newState = { id: generateId(), used: false, usedAt: null };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(newState));
      return newState;
    }

    function saveState(state) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    const state = getState();
    const now = new Date();

    // ID表示
    document.getElementById('coupon-id').innerText = state.id;
    document.getElementById('modal-id-display').innerText = 'ID: ' + state.id;

    // 状態に応じて表示切り替え
    if (now > EXPIRY) {
      // 期限切れ
      document.getElementById('active-view').style.display = 'none';
      document.getElementById('expired-view').style.display = 'block';
    } else if (state.used) {
      // 使用済み
      document.getElementById('active-view').style.display = 'none';
      document.getElementById('used-view').style.display = 'block';
      document.getElementById('used-time').innerText = '使用日時: ' + state.usedAt;
      document.getElementById('used-id-display').innerText = 'ID: ' + state.id;
    }
    // それ以外は通常表示（active-view）

    function openModal() {
      document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('modal').style.display = 'none';
    }

    function useCoupon() {
      closeModal();

      const now = new Date();
      const timeStr = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

      // 状態を保存
      state.used = true;
      state.usedAt = timeStr;
      saveState(state);

      // 画面切り替え
      document.getElementById('active-view').style.display = 'none';
      document.getElementById('used-view').style.display = 'block';
      document.getElementById('used-time').innerText = '使用日時: ' + timeStr;
      document.getElementById('used-id-display').innerText = 'ID: ' + state.id;

      confetti({
        particleCount: 150,
        spread: 80,
        colors: ['#e74c3c','#f39c12','#27ae60','#3498db'],
        origin: { y: 0.6 }
      });
    }
  </script>
</body>
</html>
